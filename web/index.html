<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゲーム神社</title>
<style>
  :root { --gold:#e8c66a; --red:#b03a2e; --ink:#f3ece0; --bg:#140d17; }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(circle at 50% 20%, #2a1830 0%, var(--bg) 70%);
    color: var(--ink); font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    overflow: hidden; user-select: none;
  }
  #app { height: 100vh; display: flex; align-items: center; justify-content: center; }
  .screen { display: none; width: 100%; max-width: 760px; padding: 32px; text-align: center; }
  .screen.active { display: block; animation: fade .4s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }
  h1 { font-size: clamp(40px, 9vw, 84px); color: var(--gold);
       text-shadow: 0 0 24px rgba(232,198,106,.5); letter-spacing: .15em; }
  .torii { font-size: clamp(80px, 18vw, 150px); line-height: 1; filter: drop-shadow(0 0 18px rgba(176,58,46,.6)); }
  .hint { margin-top: 28px; color: #b9a98f; font-size: 15px; letter-spacing: .08em; }
  .key { display:inline-block; border:1px solid var(--gold); border-radius:6px;
         padding:1px 9px; margin:0 2px; color:var(--gold); font-size:14px; }
  .q { font-size: clamp(20px, 4.4vw, 30px); margin-bottom: 36px; color: var(--ink); }
  .choices { display: flex; gap: 24px; justify-content: center; }
  .choice { flex: 1; max-width: 300px; padding: 30px 18px; border: 2px solid #5a4a3a;
            border-radius: 16px; background: rgba(255,255,255,.03); font-size: clamp(18px,3.4vw,24px); }
  .choice .badge { display:block; margin-bottom:12px; font-size:13px; color:var(--gold); letter-spacing:.1em; }
  .choice.za { border-color:#6ad1e8; } .choice.cb { border-color:#e86ad1; }
  .progress { margin-bottom: 26px; color: #8a7a64; letter-spacing: .3em; font-size: 14px; }
  .pray-msg { font-size: clamp(20px, 4.6vw, 30px); line-height: 1.7; margin: 26px 0; color: var(--gold); }
  .gauge { width: 70%; max-width: 380px; height: 16px; margin: 22px auto 8px; border:1px solid var(--gold);
           border-radius: 8px; overflow: hidden; background: rgba(0,0,0,.4); }
  .gauge > i { display:block; height:100%; width:0%; transition: width .08s; }
  .lap { color:#8a7a64; font-size:13px; letter-spacing:.15em; }
  .err { color: #e88; }
  #frameWrap { position: fixed; inset: 0; background:#000; display:none; }
  #frameWrap.active { display: block; }
  #gameFrame { width: 100%; height: 100%; border: 0; }
  #frameBar { position: fixed; top: 0; left: 0; right: 0; padding: 6px 14px; font-size: 13px;
              color: var(--gold); background: rgba(0,0,0,.55); display: flex; justify-content: space-between; }
</style>
</head>
<body>
<div id="app">
  <section id="s-title" class="screen active">
    <div class="torii">⛩️</div>
    <h1>ゲーム神社</h1>
    <p class="hint">あなたの遊びを、AIが授ける神社。</p>
    <p class="hint"><span class="key">Z</span> ゲームを始める</p>
  </section>

  <section id="s-quiz" class="screen">
    <div class="progress" id="q-progress"></div>
    <div class="q">どちらの遊びが欲しい？</div>
    <div class="choices">
      <div class="choice za" id="c-a"><span class="badge"><span class="key">Z</span></span><span id="c-a-t"></span></div>
      <div class="choice cb" id="c-b"><span class="badge"><span class="key">C</span></span><span id="c-b-t"></span></div>
    </div>
    <p class="hint"><span class="key">Z</span> 左を選ぶ　<span class="key">C</span> 右を選ぶ</p>
  </section>

  <section id="s-pray" class="screen">
    <div class="torii">⛩️</div>
    <p class="pray-msg" id="pray-msg">あなたが欲しいゲームを授けます。<br>祈ってください。</p>
    <div class="gauge"><i id="pray-fill"></i></div>
    <p class="lap" id="pray-lap"></p>
    <p class="hint" id="pray-hint"><span class="key">Z</span> を連打して祈る</p>
  </section>
</div>

<div id="frameWrap">
  <div id="frameBar"><span id="frameTitle"></span><span><span class="key">C</span> 神社へ戻る</span></div>
  <iframe id="gameFrame" title="game"></iframe>
</div>

<script>
const SCREENS = ["title", "quiz", "pray"];
const LAP_COLORS = [
  "linear-gradient(90deg,#1b6,#6ad1e8)",   // cyan
  "linear-gradient(90deg,#a26,#e86ad1)",   // magenta
  "linear-gradient(90deg,#b80,#e8c66a)",   // gold
  "linear-gradient(90deg,#6a2,#b6e86a)",   // lime
  "linear-gradient(90deg,#b03a2e,#e8896a)",// red
];
const PRAY_PER_LAP = 30;

let screen = "title";
let questions = [];
let qIndex = 0;
let answers = [];
let prayCount = 0;
let job = null;
let poll = null;
let done = false;     // 生成完了したか
let pending = null;    // 完了したゲーム {game_id, title}

function show(name) {
  screen = name;
  SCREENS.forEach(s => document.getElementById("s-" + s).classList.toggle("active", s === name));
  document.getElementById("frameWrap").classList.remove("active");
}

async function loadQuestions() {
  try { questions = (await (await fetch("/api/questions")).json()).questions; }
  catch (e) {
    questions = [
      { id: "tempo", a: "スピード重視", b: "じっくり考える" },
      { id: "stance", a: "攻める（破壊・得点）", b: "避ける（生存）" },
      { id: "goal", a: "一発勝負（タイムアタック）", b: "積み上げ（コンボ・スコア）" },
    ];
  }
}

function renderQuiz() {
  const q = questions[qIndex];
  document.getElementById("q-progress").textContent = `問 ${qIndex + 1} / ${questions.length}`;
  document.getElementById("c-a-t").textContent = q.a;
  document.getElementById("c-b-t").textContent = q.b;
}

function startQuiz() { qIndex = 0; answers = []; show("quiz"); renderQuiz(); }

function answer(choice) {
  answers.push(choice);
  qIndex++;
  if (qIndex < questions.length) renderQuiz();
  else startPray();
}

// 祈り開始＝この瞬間にゲーム生成をキック（連打中に裏で作る）
function startPray() {
  prayCount = 0; done = false; pending = null; job = null;
  document.getElementById("pray-fill").style.width = "0%";
  document.getElementById("pray-fill").style.background = LAP_COLORS[0];
  document.getElementById("pray-lap").textContent = "";
  document.getElementById("pray-msg").innerHTML = "あなたが欲しいゲームを授けます。<br>祈ってください。";
  document.getElementById("pray-hint").innerHTML = '<span class="key">Z</span> を連打して祈る';
  show("pray");
  kickGeneration();
}

async function kickGeneration() {
  try {
    job = (await (await fetch("/api/pray", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ answers }),
    })).json()).job_id;
  } catch (e) { return prayError("祈りが届きませんでした"); }

  poll = setInterval(async () => {
    let s;
    try { s = await (await fetch("/api/status/" + job)).json(); } catch (e) { return; }
    if (s.state === "done") {
      clearInterval(poll);
      done = true; pending = { game_id: s.game_id, title: s.title || "授かりもの" };
      if (screen === "pray") playPending();   // 連打が続いてても完成で即切替
    } else if (s.state === "error") {
      clearInterval(poll); prayError("神託が降りませんでした");
    }
  }, 700);
}

function pray() {
  prayCount++;
  const lap = Math.floor(prayCount / PRAY_PER_LAP);
  const pos = prayCount % PRAY_PER_LAP;
  const fill = document.getElementById("pray-fill");
  fill.style.width = (pos === 0 ? 100 : (pos / PRAY_PER_LAP) * 100) + "%";
  fill.style.background = LAP_COLORS[lap % LAP_COLORS.length];
  document.getElementById("pray-lap").textContent =
    lap > 0 ? `祈り ${lap} 周目…` : "";
  if (pos === 0 && prayCount > 0) {
    // 周回リセット（次の押下で 0 から）
    setTimeout(() => { if (screen === "pray") fill.style.width = "0%"; }, 90);
  }
  if (done) playPending();
}

function playPending() {
  if (!pending) return;
  playGame(pending.game_id, pending.title);
}

function prayError(msg) {
  job = null; pending = null;   // C で再参拝できるように
  document.getElementById("pray-msg").innerHTML = `<span class="err">${msg}</span>`;
  document.getElementById("pray-hint").innerHTML = '<span class="key">C</span> でもう一度参拝する';
}

function playGame(gameId, title) {
  document.getElementById("frameTitle").textContent = "⛩️ " + title;
  const frame = document.getElementById("gameFrame");
  frame.src = "/games/" + gameId + "/index.html";
  document.getElementById("frameWrap").classList.add("active");
  setTimeout(() => frame.focus(), 100);
}

function backToTitle() {
  if (poll) clearInterval(poll);
  document.getElementById("gameFrame").src = "about:blank";
  show("title");
}

document.addEventListener("keydown", (e) => {
  const k = e.key;
  if (document.getElementById("frameWrap").classList.contains("active")) {
    if (k === "c" || k === "C") backToTitle();   // ゲーム中は C で神社へ
    return;
  }
  if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," ","z","Z","c","C"].includes(k)) e.preventDefault();

  if (screen === "title") {
    if (k === "z" || k === "Z") startQuiz();
  } else if (screen === "quiz") {
    if (k === "z" || k === "Z") answer("a");
    else if (k === "c" || k === "C") answer("b");
  } else if (screen === "pray") {
    if (k === "z" || k === "Z") pray();
    else if ((k === "c" || k === "C") && pending === null && job === null) startQuiz();
  }
});

loadQuestions();
</script>
</body>
</html>
